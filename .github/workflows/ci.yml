name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test

  package:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run package
      - name: Create Release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.dmg \
            --title "Loud Talker ${GITHUB_REF_NAME}" \
            --notes "See the [changelog](COMMIT_URL_BASE/HEAD..${GITHUB_REF_NAME}) for details." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
